<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AgroIntel</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--green:#2d6a4f;--lime:#95d5b2;--gold:#d4a017;--dark:#1a1a2e}
    body{font-family:'DM Sans',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 80% 50%,rgba(45,106,79,0.2) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 20% 20%,rgba(212,160,23,0.08) 0%,transparent 50%)}
    .card{position:relative;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-radius:28px;padding:3rem;width:100%;max-width:520px;animation:slideUp 0.6s ease both}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .back-link{display:inline-block;color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;margin-bottom:1.5rem;transition:color 0.2s}
    .back-link:hover{color:#fff}
    .card-logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:0.3rem}
    .card-logo span{color:var(--gold)}
    .card-sub{color:rgba(255,255,255,0.4);font-size:0.85rem;margin-bottom:1.5rem}
    h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:#fff;font-weight:700;margin-bottom:1.5rem}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .field{margin-bottom:1.1rem}
    label{display:block;font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:0.4rem;letter-spacing:0.5px;text-transform:uppercase}
    input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:0.8rem 1rem;color:#fff;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
    input:focus{border-color:var(--lime);background:rgba(255,255,255,0.1)}
    input::placeholder{color:rgba(255,255,255,0.3)}
    .btn{width:100%;background:var(--green);color:#fff;border:none;padding:0.95rem;border-radius:12px;font-size:1rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.25s;margin-top:0.5rem;box-shadow:0 4px 20px rgba(45,106,79,0.4)}
    .btn:hover{background:#1b4332;transform:translateY(-2px)}
    .login-link{text-align:center;color:rgba(255,255,255,0.5);font-size:0.88rem;margin-top:1.2rem}
    .login-link a{color:var(--lime);text-decoration:none;font-weight:500}
    .alert-error{background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);color:#fca5a5;border-radius:10px;padding:0.75rem 1rem;font-size:0.88rem;margin-bottom:1rem}
  </style>
</head>
<body>
<div class="card">
  <a href="/" class="back-link">← Back to Home</a>
  <div class="card-logo"><span style="color:#fff">Agro</span><span style="color:var(--gold)">Intel</span></div>
  <div class="card-sub">Create your farmer account — free forever</div>
  <h2>Create Account</h2>

  {% if error %}
  <div class="alert-error">❌ {{ error }}</div>
  {% endif %}

  <form action="/register_user" method="POST">
    <div class="grid-2">
      <div class="field">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="John Doe" required/>
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="min. 8 chars" required/>
      </div>
    </div>
    <div class="field">
      <label>Mobile Number</label>
      <input type="text" name="mobile" placeholder="10-digit mobile number" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="min. 8 characters" required/>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>City</label>
        <input type="text" name="city" placeholder="Your city" required/>
      </div>
      <div class="field">
        <label>State</label>
        <input type="text" name="state" placeholder="Your state" required/>
      </div>
    </div>
    <button type="submit" class="btn">Create Account →</button>
  </form>
  <div class="login-link">Already have an account? <a href="/login">Login here</a></div>
</div>
</body>
</html>
